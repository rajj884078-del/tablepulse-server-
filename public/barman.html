<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest-bar.json">
<meta name="theme-color" content="#0e1014">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TablePulse">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>TablePulse — Bar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0e1014;color:#e8eaed;padding:14px;padding-bottom:60px;}
.wrap{max-width:720px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
h1{font-size:18px;font-weight:700;letter-spacing:-0.2px;}
h1 span{font-size:12px;font-weight:500;color:#8b9099;}
.live{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:#10241a;color:#41c980;display:inline-flex;align-items:center;gap:5px;}
.live::before{content:'';width:6px;height:6px;border-radius:50%;background:#41c980;}
.rest{font-size:12px;color:#8b9099;margin-bottom:12px;}
.voice-bar{display:flex;align-items:center;gap:12px;padding:13px 14px;background:#161a20;border:1px solid #232830;border-radius:11px;margin-bottom:14px;cursor:pointer;}
.voice-icon{width:36px;height:36px;border-radius:9px;border:1.5px solid #1a7a45;background:#10241a;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.voice-label{flex:1;}
.voice-label strong{font-size:14px;font-weight:600;color:#e8eaed;display:block;}
.voice-label span{font-size:12px;color:#8b9099;}
.voice-status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;background:#10241a;color:#41c980;}
.card{background:#161a20;border:1px solid #232830;border-radius:14px;padding:16px;margin-bottom:10px;}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.table-name{font-size:22px;font-weight:800;letter-spacing:-0.3px;}
.meta{font-size:12px;color:#8b9099;margin-top:2px;}
.age{font-size:12px;color:#525965;white-space:nowrap;}
.sync-tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:#1a1407;color:#d4a017;margin-top:5px;letter-spacing:.3px;}
.coord-notice{background:#101826;border:1px solid #1e3a5a;border-radius:9px;padding:11px 13px;margin-bottom:10px;font-size:13px;font-weight:600;color:#5aa2f5;}
.act-btn{width:100%;padding:16px;border:1.5px solid #1a7a45;border-radius:11px;background:#1a7a45;color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:transform .1s,opacity .1s;margin-bottom:8px;}
.act-btn.bell{background:#101826;border-color:#1e3a5a;color:#5aa2f5;font-size:14px;font-weight:600;}
.act-btn.blocked{
  background:#0d1a0d;
  border-color:#1a7a45;
  color:#41c980;
  cursor:not-allowed;
  position:relative;
  opacity:0.85;
}
.act-btn.blocked::before{
  content:'';
  position:absolute;
  top:50%;
  left:12px;
  right:12px;
  height:1.5px;
  background:#41c980;
  opacity:0.4;
  transform:translateY(-50%);
}
.act-btn:active{transform:scale(0.96);opacity:0.85;}
.status-line{font-size:14px;font-weight:600;padding:8px 0;color:#41c980;}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:600;display:none;z-index:50;max-width:90%;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.green{background:#10241a;color:#41c980;border:1px solid #1a7a45;}
.toast.blue{background:#101826;color:#5aa2f5;border:1px solid #1e3a5a;}
.section-title{font-size:11px;font-weight:700;color:#8b9099;text-transform:uppercase;letter-spacing:.8px;margin:0 2px 10px;}
.empty{text-align:center;padding:3rem 1rem;color:#525965;font-size:15px;}
</style>
</head>
<body>
<div id="loginScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0e1014;">
  <div style="background:#161a20;border:1px solid #232830;border-radius:18px;padding:44px 32px;width:320px;text-align:center;">
    <div style="font-size:34px;margin-bottom:10px;">🍹</div>
    <h2 style="color:#e8eaed;margin:0 0 4px;font-size:21px;">Bar</h2>
    <p style="color:#8b9099;font-size:13px;margin:0 0 26px;">Enter restaurant PIN</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••"
      style="width:100%;padding:16px;font-size:24px;text-align:center;background:#0e1014;border:1px solid #2b313a;border-radius:11px;color:#fff;letter-spacing:10px;box-sizing:border-box;"/>
    <button onclick="doLogin()" style="width:100%;margin-top:16px;padding:16px;background:#2563eb;border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;">Enter</button>
    <p id="loginError" style="color:#f0635a;font-size:13px;margin:14px 0 0;display:none;"></p>
 
    </div>
    <button onclick="DISABLED" style="display:none;border:1px solid #2b313a;border-radius:10px;padding:10px 16px;color:#8b9099;font-size:13px;font-weight:600;cursor:pointer;">Logout</button>
  </div>
 </div>
</div>

<div id="mainApp" style="display:none;">
 <div class="wrap">
  <div class="topbar">
    <h1>TablePulse <span>Bar</span></h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="live">Live</span>
      
    </div>
  </div>
  <div class="rest" id="restName">Bar</div>
  
  <div id="sub-banner" style="display:none;padding:12px 14px;border-radius:11px;margin-bottom:12px;font-size:14px;font-weight:600;text-align:center;"></div>
  <div id="conn-banner" style="display:none;padding:12px 14px;border-radius:11px;margin-bottom:12px;font-size:14px;font-weight:600;text-align:center;background:#241011;border:1px solid #6e1a1a;color:#f0635a;">⚠️ Connection lost — retrying...</div>

<div class="voice-label">
      <strong>Voice alerts</strong>
      <span id="sound-hint">Voice alerts active — tap to disable</span>
    </div>
    <span id="voice-status" class="voice-status">ON</span>
  </div>

  <div class="section-title">Active drink orders</div>
  <div id="bar-orders"></div>
 </div>
</div>

<div id="b-toast" class="toast green"></div>

<script>
var soundOn=localStorage.getItem('tp_sound')!=='off', announcedNew={}, announcedBarCoord={}, firstLoad=true;
(async function(){
  var token=localStorage.getItem('tp_token');
  if(!token)return;
  try{var r=await fetch('/verify',{headers:{'x-auth-token':token}});
  if(r.ok){var d=await r.json();showApp(d.restaurantName,d.subscriptionStatus,d.subscriptionExpiry);}
  else localStorage.removeItem('tp_token');}catch(e){}
})();
async function doLogin(){
  var pin=document.getElementById('pinInput').value.trim();
  var err=document.getElementById('loginError');err.style.display='none';
  if(!pin)return;
  try{var loginUrl=window.__SLUG__?'/r/'+window.__SLUG__+'/login':'/login';
  var r=await fetch(loginUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})});
  var d=await r.json();
  if(!r.ok){err.textContent=d.error||'Wrong PIN';err.style.display='block';return;}
  localStorage.setItem('tp_token',d.token);
  localStorage.setItem('tp_sub_status',d.subscriptionStatus||'active');
  localStorage.setItem('tp_sub_expiry',d.subscriptionExpiry||'');
  showApp(d.restaurantName,d.subscriptionStatus,d.subscriptionExpiry);}
  catch(e){err.textContent='Server error.';err.style.display='block';}
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pinInput').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
});
function showApp(name, subStatus, subExpiry){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  showSubBanner(subStatus||'active', subExpiry||null);
  if(name)document.getElementById('restName').textContent=name+' — Bar';
  initPWA();
  requestWakeLock();
    loadOrders();setInterval(loadOrders,5000);
  setInterval(function(){
    Object.keys(bellBlocked).forEach(function(id){
      var btn=document.querySelector('[data-bell-id="'+id+'"]');
      if(!btn)return;
      var now=Date.now();
      if(bellBlocked[id]>now){
        var rem=Math.ceil((bellBlocked[id]-now)/1000);
        btn.textContent='✓ Waiter notified ('+rem+'s)';
      } else {
        btn.className='act-btn bell';
        btn.textContent='🔔 Partial ready — alert waiter';
        delete bellBlocked[id];
      }
    });
  },1000);
}

function updateSettingsUI(){
  var knob=document.getElementById("settings-knob");
  var toggle=document.getElementById("settings-toggle");
  var hint=document.getElementById("settings-voice-hint");
  var bknob=document.getElementById("bottom-knob");
  var btoggle=document.getElementById("bottom-toggle");
  var blabel=document.getElementById("bottom-voice-label");
  if(soundOn){
    if(knob){knob.style.left="22px";knob.style.background="#3b82f6";}
    if(toggle){toggle.style.background="#10241a";toggle.style.borderColor="#1a7a45";}
    if(hint)hint.textContent="Voice alerts active";
    if(bknob){bknob.style.left="17px";bknob.style.background="#3b82f6";}
    if(btoggle){btoggle.style.background="#10241a";btoggle.style.borderColor="#1a7a45";}
    if(blabel)blabel.textContent="🔊 Voice ON";
  } else {
    if(knob){knob.style.left="2px";knob.style.background="#8b9099";}
    if(toggle){toggle.style.background="#1c2128";toggle.style.borderColor="#2b313a";}
    if(hint)hint.textContent="Voice alerts off";
    if(bknob){bknob.style.left="3px";bknob.style.background="#8b9099";}
    if(btoggle){btoggle.style.background="#1c2128";btoggle.style.borderColor="#2b313a";}
    if(blabel)blabel.textContent="🔇 Voice OFF";
  }
}
function toggleSound(){
  soundOn=!soundOn;
  localStorage.setItem('tp_sound', soundOn?'on':'off');
  var box=document.getElementById('sound-box');
  var hint=document.getElementById('sound-hint');
  var status=document.getElementById('voice-status');
  box.style.background=soundOn?'#10241a':'transparent';
  box.style.borderColor=soundOn?'#1a7a45':'#2b313a';
  box.textContent=soundOn?'🔊':'🔇';
  hint.textContent=soundOn?'Voice alerts active — tap to disable':'Tap to enable — required for alerts';
  status.textContent=soundOn?'ON':'OFF';
  status.style.background=soundOn?'#10241a':'#1c2128';
  status.style.color=soundOn?'#41c980':'#8b9099';
  if(soundOn)speak('Voice alerts on');
  updateSettingsBadge();
}
function speak(text){
  if(!soundOn)return;
  try{var u=new SpeechSynthesisUtterance(text);u.lang='en-IN';u.rate=0.95;
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}catch(e){}
}
async function post(ep,body){
  try{var t=localStorage.getItem('tp_token');var r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':t},body:JSON.stringify(body)});return await r.json();}catch(e){return null;}
}
function toast(msg,cls){
  var el=document.getElementById('b-toast');el.className='toast '+(cls||'green');
  el.textContent=msg;el.style.display='block';setTimeout(function(){el.style.display='none';},3500);
}
function showConn(ok){var el=document.getElementById('conn-banner');if(el)el.style.display=ok?'none':'block';}
function ta(d){var m=Math.floor((new Date()-new Date(d))/60000);return m<1?'just now':m+'m ago';}
async function loadOrders(){
  try{var t=localStorage.getItem('tp_token');var r=await fetch('/active-orders',{headers:{'x-auth-token':t}});if(r.status===401){localStorage.removeItem('tp_token');location.reload();return;}var all=await r.json();
  var orders=all.filter(function(o){
    if(!o.toB)return false;
    return (o.courses||[]).some(function(c){return c.type==='drinks';});
  });
  orders.forEach(function(o){
    var dr=(o.courses||[]).find(function(c){return c.type==='drinks';});
    if(dr&&dr.status==='waiting'&&!announcedNew[o._id]){
      announcedNew[o._id]=true;
      if(!firstLoad)speak('Table '+o.table+', drinks order'+(o.sameTime?', same time with starters':''));
    }
    if(o.bNotified&&!announcedBarCoord[o._id]){
      announcedBarCoord[o._id]=true;
      if(!firstLoad)speak('Table '+o.table+', coordinate with kitchen — serve drinks with starters');
    }
  });
  checkBellStatus(orders);renderOrders(orders);firstLoad=false;
  showConn(true);
  }catch(e){showConn(false);}
}
function renderOrders(orders){
  var el=document.getElementById('bar-orders');
  if(!orders.length){el.innerHTML='<div class="empty">No drink orders</div>';return;}
  el.innerHTML=orders.map(function(o){
    var drinks=(o.courses||[]).find(function(c){return c.type==='drinks';});
    if(!drinks)return '';
    var coord=o.bNotified?'<div class="coord-notice">Coordinate with kitchen — serve drinks + food together</div>':'';
    var isBlocked=bellBlocked[o._id]&&bellBlocked[o._id]>Date.now();
    var rem=isBlocked?Math.ceil((bellBlocked[o._id]-Date.now())/1000):0;
    var bellCls=isBlocked?'act-btn blocked':'act-btn bell';
    var bellTxt=isBlocked?'✓ Waiter notified ('+rem+'s)':'Partial ready — alert waiter';
    var bellClk=isBlocked?'':'onclick="notifyWaiterBar(\''+o._id+'\',\''+o.table+'\'"';
    var action=drinks.status==='waiting'
      ?'<button class="act-btn" onclick="drinksReady(\''+o._id+'\')">Drinks ready — all done</button>'+
       '<button class="'+bellCls+'" data-bell-id="'+o._id+'" '+bellClk+'>'+bellTxt+'</button>'
      :'<div class="status-line">Drinks served</div>';
    return '<div class="card"><div class="order-top"><div>'+
      '<div class="table-name">Table '+o.table+'</div>'+
      '<div class="meta">'+o.orderName+' Drinks x'+drinks.qty+'</div>'+
      (o.sameTime?'<span class="sync-tag">SAME-TIME</span>':'')+
      '</div><div class="age">'+ta(o.createdAt)+'</div></div>'+
      coord+action+'</div>';
  }).join('');
}
function checkBellStatus(orders){
  orders.forEach(function(o){
    if(o.bellBlockedUntil && new Date(o.bellBlockedUntil) > new Date()){
      bellBlocked[o._id] = new Date(o.bellBlockedUntil).getTime();
    } else {
      delete bellBlocked[o._id];
    }
  });
}
async function drinksReady(id){
  await post('/update-course',{orderId:id,courseType:'drinks',status:'ready'});
  toast('Drinks marked ready','green');loadOrders();
}
var bellBlocked={};
async function notifyWaiterBar(id, table){
  if(bellBlocked[id]&&bellBlocked[id]>Date.now()){
    var rem=Math.ceil((bellBlocked[id]-Date.now())/1000);
    toast('Waiter acknowledged — bell blocked ('+rem+'s)','green');
    return;
  }
  var msg='Table '+table+', drinks ready';
  await post('/notify-waiter',{orderId:id,message:msg});
  toast('🔔 Waiter notified — '+msg,'blue');
}
function showSubBanner(status, expiry){
  var el=document.getElementById('sub-banner');if(!el)return;
  if(status==='warning'&&expiry){var d=new Date(expiry).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});el.style.display='block';el.style.background='#1f1810';el.style.border='1px solid #a16207';el.style.color='#d4a017';el.textContent='Renew before '+d+' to continue using TablePulse';}
  else if(status==='expired'){el.style.display='block';el.style.background='#241011';el.style.border='1px solid #6e1a1a';el.style.color='#f0635a';el.textContent='Subscription expired — contact restaurant owner to renew';}
}
function logout(){
  if(!confirm('Log out of this device?'))return;
  if('serviceWorker' in navigator){navigator.serviceWorker.ready.then(reg=>{reg.pushManager.getSubscription().then(sub=>{if(sub){var token=localStorage.getItem('tp_token');fetch('/subscribe',{method:'DELETE',headers:{'Content-Type':'application/json','x-auth-token':token},body:JSON.stringify({endpoint:sub.endpoint})});sub.unsubscribe();}});});}
  localStorage.clear();location.reload();
}
async function initPWA(){
  if(!('serviceWorker' in navigator))return;
  try{const reg=await navigator.serviceWorker.register('/service-worker.js');setTimeout(()=>subscribeToPush(reg),2000);}catch(e){}
}
async function subscribeToPush(reg){
  if(!('PushManager' in window))return;
  try{
    const keyRes=await fetch('/vapid-public-key');const{key}=await keyRes.json();if(!key)return;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      const perm=await Notification.requestPermission();
      if(perm!=='granted')return;
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(key)});
    }
    const token=localStorage.getItem('tp_token');if(!token)return;
    await fetch('/subscribe',{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':token},body:JSON.stringify({role:'bar',endpoint:sub.endpoint,keys:{p256dh:arrayBufferToBase64(sub.getKey('p256dh')),auth:arrayBufferToBase64(sub.getKey('auth'))}})});
  }catch(e){}
}
function urlBase64ToUint8Array(b){const p='='.repeat((4-b.length%4)%4);const base64=(b+p).replace(/-/g,'+').replace(/_/g,'/');const raw=window.atob(base64);return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}
function arrayBufferToBase64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
var wakeLock=null;
async function requestWakeLock(){if(!('wakeLock' in navigator))return;try{wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',()=>{requestWakeLock();});}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')requestWakeLock();});
var audioUnlocked=false;
document.addEventListener('touchstart',function(){if(!audioUnlocked&&soundOn){audioUnlocked=true;try{var u=new SpeechSynthesisUtterance('');window.speechSynthesis.speak(u);}catch(e){}}},{once:true,passive:true});
document.addEventListener('touchstart',function(e){var el=e.target.closest('button');if(!el)return;el.style.transform='scale(0.94)';el.style.opacity='0.8';},{passive:true});
document.addEventListener('touchend',function(e){var el=e.target.closest('button');if(!el)return;setTimeout(function(){el.style.transform='';el.style.opacity='';},110);},{passive:true});
document.addEventListener('touchcancel',function(e){var el=e.target.closest('button');if(!el)return;el.style.transform='';el.style.opacity='';},{passive:true});

function openSettings(){
  var p=document.getElementById('settings-page');
  if(p){ p.style.display='block'; p.style.visibility='visible'; updateSettingsPage(); }
}
function closeSettings(){
  var p=document.getElementById('settings-page');
  if(p){ p.style.display='none'; p.style.visibility='hidden'; }
}
function updateSettingsPage(){
  var knob=document.getElementById('sp-knob');
  var toggle=document.getElementById('sp-toggle');
  var sub=document.getElementById('sp-voice-sub');
  if(!knob)return;
  if(soundOn){
    knob.style.left='25px';knob.style.background='#3b82f6';
    toggle.style.background='#10241a';toggle.style.border='1px solid #1a7a45';
    if(sub)sub.textContent='Active — tap to disable';
  }else{
    knob.style.left='3px';knob.style.background='#525965';
    toggle.style.background='#1c2128';toggle.style.border='1px solid #2b313a';
    if(sub)sub.textContent='Off — tap to enable';
  }
}
function toggleSoundSettings(){
  soundOn=!soundOn;
  localStorage.setItem('tp_sound',soundOn?'on':'off');
  updateSettingsPage();
  if(soundOn)speak('Voice alerts on');
}
</script>


  <div style="height:1px;background:#1a1f26;margin:0 8px;"></div>

</div>


<div id="settings-page" style="display:none;visibility:hidden;position:fixed;top:0;left:0;right:0;bottom:0;background:#0e1014;z-index:500;overflow-y:auto;">
  <div style="max-width:720px;margin:0 auto;padding:20px 16px 60px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
      <button onclick="closeSettings()" style="width:36px;height:36px;border-radius:50%;background:#161a20;border:1px solid #232830;color:#e8eaed;font-size:20px;cursor:pointer;">←</button>
      <h2 style="font-size:18px;font-weight:700;color:#e8eaed;margin:0;">Settings</h2>
    </div>
    <div style="background:#161a20;border:1px solid #232830;border-radius:16px;overflow:hidden;margin-bottom:16px;">
      <div onclick="toggleSoundSettings()" style="display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer;">
        <div>
          <div style="font-size:15px;font-weight:600;color:#e8eaed;">Voice alerts</div>
          <div style="font-size:12px;color:#8b9099;margin-top:3px;" id="sp-voice-sub">Loading...</div>
        </div>
        <div style="width:50px;height:28px;border-radius:14px;position:relative;transition:background .2s;flex-shrink:0;" id="sp-toggle">
          <div style="width:22px;height:22px;border-radius:50%;position:absolute;top:3px;transition:left .2s;" id="sp-knob"></div>
        </div>
      </div>
    </div>
    <div style="background:#161a20;border:1px solid #232830;border-radius:16px;overflow:hidden;">
      <div style="padding:10px 16px;border-bottom:1px solid #1a1f26;">
        <div style="font-size:11px;font-weight:700;color:#525965;text-transform:uppercase;letter-spacing:.8px;">Account</div>
      </div>
      <div onclick="logout()" style="display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer;">
        <span style="font-size:15px;font-weight:600;color:#f0635a;">Logout</span>
        <span style="color:#f0635a;font-size:20px;">→</span>
      </div>
    </div>
    <div style="text-align:center;padding:24px 0 0;">
      <div style="font-size:11px;color:#525965;">TablePulse v1.0</div>
    </div>
  </div>
</div>

<button onclick="openSettings()" id="settings-fab" style="position:fixed;bottom:20px;right:16px;width:38px;height:38px;border-radius:50%;background:#161a20;border:1px solid #2b313a;font-size:16px;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;">⚙️</button>
</body>
