<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TablePulse — Bar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0e1014;color:#e8eaed;padding:14px;padding-bottom:60px;}
.wrap{max-width:720px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
h1{font-size:18px;font-weight:700;letter-spacing:-0.2px;}
h1 span{font-size:12px;font-weight:500;color:#8b9099;}
.live{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:#10241a;color:#41c980;display:inline-flex;align-items:center;gap:5px;}
.live::before{content:'';width:6px;height:6px;border-radius:50%;background:#41c980;}
.rest{font-size:12px;color:#8b9099;margin-bottom:12px;}

/* Voice toggle — identical pattern to kitchen */
.voice-bar{display:flex;align-items:center;gap:12px;padding:13px 14px;background:#161a20;border:1px solid #232830;border-radius:11px;margin-bottom:14px;cursor:pointer;}
.voice-icon{width:36px;height:36px;border-radius:9px;border:1.5px solid #2b313a;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.voice-icon.on{background:#10241a;border-color:#1a7a45;}
.voice-label{flex:1;}
.voice-label strong{font-size:14px;font-weight:600;color:#e8eaed;display:block;}
.voice-label span{font-size:12px;color:#8b9099;}
.voice-status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;}
.voice-status.on{background:#10241a;color:#41c980;}
.voice-status.off{background:#1c2128;color:#8b9099;}

/* Cards */
.card{background:#161a20;border:1px solid #232830;border-radius:14px;padding:16px;margin-bottom:10px;}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.table-name{font-size:22px;font-weight:800;letter-spacing:-0.3px;}
.meta{font-size:12px;color:#8b9099;margin-top:2px;}
.age{font-size:12px;color:#525965;white-space:nowrap;}
.sync-tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:#1a1407;color:#d4a017;margin-top:5px;letter-spacing:.3px;}

/* Coordinate notice */
.coord-notice{background:#101826;border:1px solid #1e3a5a;border-radius:9px;padding:11px 13px;margin-bottom:10px;font-size:13px;font-weight:600;color:#5aa2f5;}

/* Action */
.act-btn{width:100%;padding:16px;border:1.5px solid #1a7a45;border-radius:11px;background:#1a7a45;color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:transform .1s,opacity .1s;}
.status-line{font-size:14px;font-weight:600;padding:8px 0;color:#41c980;}

/* Toast */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:600;display:none;z-index:50;max-width:90%;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.green{background:#10241a;color:#41c980;border:1px solid #1a7a45;}
.toast.blue{background:#101826;color:#5aa2f5;border:1px solid #1e3a5a;}
.section-title{font-size:11px;font-weight:700;color:#8b9099;text-transform:uppercase;letter-spacing:.8px;margin:0 2px 10px;}
.empty{text-align:center;padding:3rem 1rem;color:#525965;font-size:15px;}
</style>
</head>
<body>
<div id="loginScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0e1014;">
  <div style="background:#161a20;border:1px solid #232830;border-radius:18px;padding:44px 32px;width:320px;text-align:center;">
    <div style="font-size:34px;margin-bottom:10px;">🍹</div>
    <h2 style="color:#e8eaed;margin:0 0 4px;font-size:21px;">Bar</h2>
    <p style="color:#8b9099;font-size:13px;margin:0 0 26px;">Enter restaurant PIN</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••"
      style="width:100%;padding:16px;font-size:24px;text-align:center;background:#0e1014;border:1px solid #2b313a;border-radius:11px;color:#fff;letter-spacing:10px;box-sizing:border-box;"/>
    <button onclick="doLogin()" style="width:100%;margin-top:16px;padding:16px;background:#2563eb;border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;">Enter</button>
    <p id="loginError" style="color:#f0635a;font-size:13px;margin:14px 0 0;display:none;"></p>
  </div>
</div>

<div id="mainApp" style="display:none;">
 <div class="wrap">
  <div class="topbar">
    <h1>TablePulse <span>Bar</span></h1>
    <span class="live">Live</span>
  </div>
  <div class="rest" id="restName">Bar</div>
  <div id="sub-banner" style="display:none;padding:12px 14px;border-radius:11px;margin-bottom:12px;font-size:14px;font-weight:600;text-align:center;"></div>

  <div class="voice-bar" onclick="toggleSound()">
    <div class="voice-icon" id="sound-box">🔇</div>
    <div class="voice-label">
      <strong>Voice alerts</strong>
      <span id="sound-hint">Tap to enable — required for alerts</span>
    </div>
    <span class="voice-status off" id="voice-status">OFF</span>
  </div>

  <div class="section-title">Active drink orders</div>
  <div id="bar-orders"></div>
 </div>
</div>

<div id="b-toast" class="toast green"></div>

<script>
var soundOn=false, announcedNew={}, firstLoad=true;
(async function(){
  var token=localStorage.getItem('tp_token');
  if(!token)return;
  try{var r=await fetch('/verify',{headers:{'x-auth-token':token}});
  if(r.ok){var d=await r.json();showApp(d.restaurantName,d.subscriptionStatus,d.subscriptionExpiry);}
  else localStorage.removeItem('tp_token');}catch(e){}
})();
async function doLogin(){
  var pin=document.getElementById('pinInput').value.trim();
  var err=document.getElementById('loginError');err.style.display='none';
  if(!pin)return;
  try{var loginUrl=window.__SLUG__?'/r/'+window.__SLUG__+'/login':'/login';
  var r=await fetch(loginUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})});
  var d=await r.json();
  if(!r.ok){err.textContent=d.error||'Wrong PIN';err.style.display='block';return;}
  localStorage.setItem('tp_token',d.token);
  localStorage.setItem('tp_sub_status',d.subscriptionStatus||'active');
  localStorage.setItem('tp_sub_expiry',d.subscriptionExpiry||'');
  showApp(d.restaurantName,d.subscriptionStatus,d.subscriptionExpiry);}
  catch(e){err.textContent='Server error.';err.style.display='block';}
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pinInput').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
});
function showApp(name, subStatus, subExpiry){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  showSubBanner(subStatus||'active', subExpiry||null);
  if(name)document.getElementById('restName').textContent=name+' — Bar';
  loadOrders();setInterval(loadOrders,5000);
}
function toggleSound(){
  soundOn=!soundOn;
  var box=document.getElementById('sound-box');
  var hint=document.getElementById('sound-hint');
  var status=document.getElementById('voice-status');
  box.classList.toggle('on',soundOn);
  box.textContent=soundOn?'🔊':'🔇';
  hint.textContent=soundOn?'New drink order alerts active':'Tap to enable — required for alerts';
  status.textContent=soundOn?'ON':'OFF';
  status.className='voice-status '+(soundOn?'on':'off');
  if(soundOn)speak('Voice alerts on');
}
function speak(text){
  if(!soundOn)return;
  try{var u=new SpeechSynthesisUtterance(text);u.lang='en-IN';u.rate=0.95;
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}catch(e){}
}
async function post(ep,body){
  try{var t=localStorage.getItem('tp_token');var r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':t},body:JSON.stringify(body)});return await r.json();}catch(e){return null;}
}
function toast(msg,cls){
  var el=document.getElementById('b-toast');el.className='toast '+(cls||'green');
  el.textContent=msg;el.style.display='block';setTimeout(function(){el.style.display='none';},3500);
}
function ta(d){var m=Math.floor((new Date()-new Date(d))/60000);return m<1?'just now':m+'m ago';}
async function loadOrders(){
  try{var t=localStorage.getItem('tp_token');var r=await fetch('/active-orders',{headers:{'x-auth-token':t}});if(r.status===401){localStorage.removeItem('tp_token');location.reload();return;}var all=await r.json();
  var orders=all.filter(function(o){
    if(!o.toB)return false;
    return (o.courses||[]).some(function(c){return c.type==='drinks';});
  });
  orders.forEach(function(o){
    var dr=(o.courses||[]).find(function(c){return c.type==='drinks';});
    if(dr&&dr.status==='waiting'&&!announcedNew[o._id]){
      announcedNew[o._id]=true;
      if(!firstLoad)speak('Table '+o.table+', drinks order');
    }
  });
  renderOrders(orders);firstLoad=false;
  }catch(e){}
}
function renderOrders(orders){
  var el=document.getElementById('bar-orders');
  if(!orders.length){el.innerHTML='<div class="empty">No drink orders 🎉</div>';return;}
  el.innerHTML=orders.map(function(o){
    var drinks=(o.courses||[]).find(function(c){return c.type==='drinks';});
    if(!drinks)return '';
    var coord=o.bNotified?'<div class="coord-notice">⏱ Coordinate with kitchen — serve drinks + food together</div>':'';
    var action=drinks.status==='waiting'
      ?'<button class="act-btn" onclick="drinksReady(\''+o._id+'\')">✅ Drinks ready</button>'
      :'<div class="status-line">✅ Drinks served</div>';
    return '<div class="card"><div class="order-top"><div>'+
      '<div class="table-name">Table '+o.table+'</div>'+
      '<div class="meta">'+o.orderName+' · Drinks ×'+drinks.qty+'</div>'+
      (o.sameTime?'<span class="sync-tag">⏱ SAME-TIME</span>':'')+
      '</div><div class="age">'+ta(o.createdAt)+'</div></div>'+
      coord+action+'</div>';
  }).join('');
}
async function drinksReady(id){
  await post('/update-course',{orderId:id,courseType:'drinks',status:'ready'});
  toast('✅ Drinks marked ready','green');loadOrders();
}

function showSubBanner(status, expiry) {
  var el = document.getElementById('sub-banner');
  if (!el) return;
  if (status === 'warning' && expiry) {
    var d = new Date(expiry).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    el.style.display = 'block';
    el.style.background = '#1f1810';
    el.style.border = '1px solid #a16207';
    el.style.color = '#d4a017';
    el.textContent = '⚠️ Renew before ' + d + ' to continue using TablePulse';
  } else if (status === 'expired') {
    el.style.display = 'block';
    el.style.background = '#241011';
    el.style.border = '1px solid #6e1a1a';
    el.style.color = '#f0635a';
    el.textContent = '🔴 Subscription expired — contact restaurant owner to renew';
  }
}

document.addEventListener('touchstart', function(e) {
  var el = e.target.closest('button'); if (!el) return;
  el.style.transform = 'scale(0.94)'; el.style.opacity = '0.8';
}, { passive: true });
document.addEventListener('touchend', function(e) {
  var el = e.target.closest('button'); if (!el) return;
  setTimeout(function(){ el.style.transform=''; el.style.opacity=''; }, 110);
}, { passive: true });
document.addEventListener('touchcancel', function(e) {
  var el = e.target.closest('button'); if (!el) return;
  el.style.transform=''; el.style.opacity='';
}, { passive: true });
</script>
</body>
</html>
