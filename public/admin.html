<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TablePulse Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#fff;padding:1rem;}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:1.2rem;margin-bottom:12px;}
h1{font-size:18px;font-weight:600;margin-bottom:4px;color:#fff;}
.sub{font-size:12px;color:#666;margin-bottom:1.5rem;}
label{display:block;font-size:12px;color:#888;margin-bottom:5px;}
input{width:100%;padding:10px 12px;border:1px solid #333;border-radius:8px;font-size:14px;margin-bottom:12px;background:#111;color:#fff;}
input::placeholder{color:#444;}
.btn{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
.btn:disabled{opacity:0.5;}
.btn-red{background:#C62828;}
.btn-blue{background:#1565C0;}
.btn-grey{background:#333;margin-top:8px;}
.section-title{font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:1px;margin:1.5rem 0 10px;}
.rest-card{background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px;margin-bottom:8px;}
.rest-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px;}
.rest-meta{font-size:12px;color:#666;margin-bottom:8px;}
.rest-actions{display:flex;gap:8px;}
.act{flex:1;padding:8px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#aaa;font-size:12px;cursor:pointer;text-align:center;}
.act.green{border-color:#1a3a1a;color:#25D366;}
.act.red{border-color:#3a1a1a;color:#ff5555;}
.act.blue{border-color:#1a2a3a;color:#4a9eff;}
.toast{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:10px;display:none;}
.toast.green{background:#1a3a1a;color:#25D366;}
.toast.red{background:#3a1a1a;color:#ff5555;}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222;}
.stat-label{font-size:13px;color:#888;}
.stat-val{font-size:13px;color:#fff;font-weight:600;}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#1a3a1a;color:#25D366;margin-left:6px;}
</style>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
  <h1>🍽 TablePulse Admin</h1>
  <span style="font-size:11px;color:#444;">private</span>
</div>
<div class="sub">Restaurant management · Only you see this</div>

<div id="toast" class="toast green"></div>

<!-- ADD NEW RESTAURANT -->
<div class="card">
  <div class="section-title" style="margin-top:0;">Add New Restaurant</div>
  <label>Restaurant Name</label>
  <input type="text" id="a-name" placeholder="e.g. Gravity Family Dine and Bar"/>
  <label>PIN (4-6 digits, staff will use this)</label>
  <input type="number" id="a-pin" placeholder="e.g. 1234"/>
  <label>Owner WhatsApp Number</label>
  <input type="tel" id="a-phone" placeholder="91XXXXXXXXXX"/>
  <label>Google Review Link</label>
  <input type="text" id="a-review" placeholder="https://maps.app.goo.gl/..."/>
  <label>Avg Drink Mins</label>
  <input type="number" id="a-drink" placeholder="8" value="8"/>
  <label>Avg Starter Mins</label>
  <input type="number" id="a-starter" placeholder="18" value="18"/>
  <label>Avg Main Course Mins</label>
  <input type="number" id="a-main" placeholder="30" value="30"/>
  <button class="btn" id="add-btn" onclick="addRestaurant()">+ Add Restaurant</button>
</div>

<!-- ACTIVE RESTAURANTS -->
<div class="section-title">Active Restaurants</div>
<div id="rest-list"><div style="color:#444;font-size:13px;text-align:center;padding:2rem;">Loading...</div></div>

<!-- SEND MANUAL REPORT -->
<div class="card" style="margin-top:1rem;">
  <div class="section-title" style="margin-top:0;">Send Weekly Report Now</div>
  <div style="font-size:13px;color:#888;margin-bottom:12px;">Manually trigger the weekly WhatsApp report for any restaurant. Normally auto-sends every Monday 9am.</div>
  <label>Select Restaurant PIN</label>
  <input type="text" id="r-pin" placeholder="Restaurant PIN"/>
  <button class="btn btn-blue" onclick="sendReport()">📊 Send Report Now</button>
</div>

<script>
function toast(msg, cls) {
  var el = document.getElementById('toast');
  el.className = 'toast ' + (cls || 'green');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 4000);
}
async function post(ep, body) {
  var r = await fetch(ep, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  return r.json();
}

async function loadRestaurants() {
  try {
    var r = await fetch('/admin/restaurants');
    var list = await r.json();
    var el = document.getElementById('rest-list');
    if (!list.length) { el.innerHTML = '<div style="color:#444;font-size:13px;text-align:center;padding:2rem;">No restaurants yet</div>'; return; }
    el.innerHTML = list.map(function(r) {
      return '<div class="rest-card">' +
        '<div class="rest-name">' + r.name + '</div>' +
        '<div class="rest-meta">PIN: ' + r.pin + ' · Drinks: ' + r.avgDrinkMins + 'm · Starters: ' + r.avgStarterMins + 'm · Main: ' + r.avgMainMins + 'm</div>' +
        '<div class="rest-meta" style="color:#25D366;">📱 ' + (r.ownerPhone || 'No owner phone') + '</div>' +
        '<div class="rest-actions">' +
        '<div class="act blue" onclick="sendReport(\'' + r.pin + '\')">📊 Report</div>' +
        '<div class="act red" onclick="deleteRestaurant(\'' + r._id + '\',\'' + r.name + '\')">🗑 Delete</div>' +
        '</div></div>';
    }).join('');
  } catch(e) { document.getElementById('rest-list').innerHTML = '<div style="color:#ff5555;font-size:13px;">Failed to load</div>'; }
}

async function addRestaurant() {
  var name    = document.getElementById('a-name').value.trim();
  var pin     = document.getElementById('a-pin').value.trim();
  var phone   = document.getElementById('a-phone').value.trim();
  var review  = document.getElementById('a-review').value.trim();
  var drink   = parseInt(document.getElementById('a-drink').value) || 8;
  var starter = parseInt(document.getElementById('a-starter').value) || 18;
  var main    = parseInt(document.getElementById('a-main').value) || 30;
  if (!name || !pin) { toast('Name and PIN are required', 'red'); return; }
  var btn = document.getElementById('add-btn'); btn.disabled = true; btn.textContent = 'Adding...';
  var res = await post('/admin/add-restaurant', { name, pin, ownerPhone: phone, googleReviewLink: review, avgDrinkMins: drink, avgStarterMins: starter, avgMainMins: main });
  btn.disabled = false; btn.textContent = '+ Add Restaurant';
  if (res.ok) {
    toast('✅ ' + name + ' added! PIN: ' + pin, 'green');
    document.getElementById('a-name').value = '';
    document.getElementById('a-pin').value = '';
    document.getElementById('a-phone').value = '';
    document.getElementById('a-review').value = '';
    loadRestaurants();
  } else {
    toast('Error: ' + (res.error || 'Failed'), 'red');
  }
}

async function deleteRestaurant(id, name) {
  if (!confirm('Delete ' + name + '? This cannot be undone.')) return;
  var res = await post('/admin/delete-restaurant', { id });
  if (res.ok) { toast('Deleted ' + name, 'green'); loadRestaurants(); }
  else toast('Delete failed', 'red');
}

async function sendReport(pin) {
  var p = pin || document.getElementById('r-pin').value.trim();
  if (!p) { toast('Enter a PIN', 'red'); return; }
  var res = await post('/admin/send-report', { pin: p });
  if (res.ok) toast('📊 Report sent to owner!', 'green');
  else toast('Failed: ' + (res.error || 'unknown'), 'red');
}

loadRestaurants();
</script>
</body>
</html>
