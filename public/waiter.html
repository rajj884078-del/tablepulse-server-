<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TablePulse — Waiter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding:1rem;}
.card{background:#fff;border-radius:12px;padding:1rem;margin-bottom:10px;border:1px solid #eee;}
h1{font-size:18px;font-weight:600;margin-bottom:2px;}
.sub{font-size:12px;color:#888;margin-bottom:1rem;}
label{display:block;font-size:12px;color:#888;margin-bottom:5px;}
input[type=text],input[type=tel],input[type=number],input[type=password]{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;}
.course-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.course-label{flex:1;font-size:14px;}
.qty{width:55px !important;padding:6px 8px !important;font-size:13px !important;margin:0 !important;}
.toggle-row{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid #FF9500;border-radius:8px;background:#FFF8EE;margin:12px 0;cursor:pointer;}
.toggle-label{font-size:13px;color:#CC7700;flex:1;}
.dest-row{display:flex;gap:8px;margin:8px 0 12px;}
.chip{padding:5px 12px;border:1px solid #ddd;border-radius:20px;font-size:12px;color:#888;cursor:pointer;}
.chip.on{background:#E8F5E9;color:#2E7D32;border-color:#A5D6A7;}
.btn{width:100%;padding:13px;background:#000;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;}
.btn:disabled{opacity:0.5;}
.btn-sm{padding:8px 12px;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;font-size:12px;cursor:pointer;}
.btn-sm.red{border-color:#FFCDD2;color:#C62828;background:#FFEBEE;}
.btn-sm.yellow{border-color:#FFE082;color:#F57F17;background:#FFFDE7;}
.btn-sm.star{border-color:#FFE082;color:#F9A825;background:#FFFDE7;}
.btn-sm.orange{border-color:#FFCC80;color:#E65100;background:#FFF3E0;font-weight:600;}
.section-title{font-size:13px;font-weight:600;margin:1.25rem 0 10px;}
.tl-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f5f5;}
.tl-label{flex:1;font-size:13px;color:#888;}
.tl-label.ready{color:#2E7D32;font-weight:600;}
.tl-label.started{color:#E65100;font-weight:600;}
.pill{font-size:11px;padding:2px 8px;border-radius:10px;}
.pill-wait{background:#f5f5f5;color:#888;}
.pill-ready{background:#E8F5E9;color:#2E7D32;}
.pill-started{background:#FFF3E0;color:#E65100;}
.toast{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:10px;display:none;}
.toast.green{background:#E8F5E9;color:#2E7D32;}
.toast.orange{background:#FFF3E0;color:#E65100;}
.empty{text-align:center;padding:2rem;color:#bbb;font-size:14px;}
.sync-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#FFF3E0;color:#E65100;margin-top:3px;}
.status-bar{font-size:11px;padding:4px 10px;border-radius:10px;}
.status-bar.ok{background:#E8F5E9;color:#2E7D32;}
.status-bar.loading{background:#FFF3E0;color:#E65100;}
.actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.meta{font-size:12px;color:#aaa;margin-top:2px;}
.table-name{font-size:15px;font-weight:600;}
.order-top{display:flex;justify-content:space-between;margin-bottom:10px;}
</style>
</head>
<body>
<div id="loginScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0f0f0f;">
  <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:40px 32px;width:300px;text-align:center;">
    <div style="font-size:32px;margin-bottom:8px;">👤</div>
    <h2 style="color:#fff;margin:0 0 4px;font-size:20px;">Waiter</h2>
    <p style="color:#666;font-size:13px;margin:0 0 24px;">Enter restaurant PIN</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••" style="width:100%;padding:14px;font-size:22px;text-align:center;background:#111;border:1px solid #333;border-radius:10px;color:#fff;letter-spacing:8px;box-sizing:border-box;margin-bottom:0;"/>
    <button onclick="doLogin()" style="width:100%;margin-top:16px;padding:14px;background:#25D366;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;">Enter</button>
    <p id="loginError" style="color:#ff5555;font-size:13px;margin:12px 0 0;display:none;"></p>
  </div>
</div>
<div id="mainApp" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
    <h1>TablePulse <span style="font-size:13px;font-weight:400;color:#888;">Waiter</span></h1>
    <span id="status" class="status-bar ok">Live</span>
  </div>
  <div class="sub" id="restName">WhatsApp connected</div>
  <div id="w-toast" class="toast green"></div>
  <div class="card">
    <div class="section-title" style="margin-top:0;">New order</div>
    <label>Customer name</label><input type="text" id="w-name" placeholder="Enter name"/>
    <label>WhatsApp number</label><input type="tel" id="w-phone" placeholder="91XXXXXXXXXX"/>
    <label>Table number</label><input type="number" id="w-table" placeholder="e.g. 5"/>
    <div style="font-size:12px;color:#888;margin-bottom:8px;">Courses ordered</div>
    <div class="course-row"><input type="checkbox" id="chk-d" checked/><label class="course-label" for="chk-d">🍹 Drinks</label><input class="qty" id="qty-d" type="number" value="1" min="1"/></div>
    <div class="course-row"><input type="checkbox" id="chk-s" checked/><label class="course-label" for="chk-s">🥗 Starters</label><input class="qty" id="qty-s" type="number" value="1" min="1"/></div>
    <div class="course-row"><input type="checkbox" id="chk-m" checked/><label class="course-label" for="chk-m">🍛 Main course</label><input class="qty" id="qty-m" type="number" value="1" min="1"/></div>
    <div class="toggle-row" onclick="toggleSync()">
      <input type="checkbox" id="sync-chk"/>
      <span class="toggle-label">⏱ Customer wants drinks + starters together</span>
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:6px;">Send to</div>
    <div class="dest-row">
      <div class="chip on" id="dest-k" onclick="toggleDest('k',event)">🔥 Kitchen</div>
      <div class="chip on" id="dest-b" onclick="toggleDest('b',event)">🍹 Bar</div>
    </div>
    <button class="btn" id="place-btn" onclick="placeOrder()">Send to kitchen</button>
  </div>
  <div class="section-title">Active tables</div>
  <div id="waiter-orders"></div>
</div>
<script>
var dK=true,dB=true,sync=false;
(async function(){
  var token=localStorage.getItem('tp_token');
  if(!token)return;
  try{var r=await fetch('/verify',{headers:{'x-auth-token':token}});
  if(r.ok){var d=await r.json();showApp(d.restaurantName);}
  else localStorage.removeItem('tp_token');}catch(e){}
})();
async function doLogin(){
  var pin=document.getElementById('pinInput').value.trim();
  var err=document.getElementById('loginError');err.style.display='none';
  if(!pin)return;
  try{var r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})});
  var d=await r.json();
  if(!r.ok){err.textContent=d.error||'Wrong PIN';err.style.display='block';return;}
  localStorage.setItem('tp_token',d.token);
  localStorage.setItem('tp_restaurant_name',d.restaurantName);
  localStorage.setItem('tp_review_link',d.googleReviewLink||'');
  showApp(d.restaurantName);}catch(e){err.textContent='Server error.';err.style.display='block';}
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pinInput').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
});
function showApp(name){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  if(name)document.getElementById('restName').textContent=name+' — WhatsApp connected';
  loadOrders();setInterval(loadOrders,8000);
}
async function post(ep,body){
  try{var r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return await r.json();}catch(e){return null;}
}
function toast(msg,cls){
  var el=document.getElementById('w-toast');el.className='toast '+(cls||'green');
  el.textContent=msg;el.style.display='block';setTimeout(function(){el.style.display='none';},4000);
}
function toggleSync(){sync=!sync;document.getElementById('sync-chk').checked=sync;}
function toggleDest(d,e){e.stopPropagation();
  if(d==='k'){dK=!dK;document.getElementById('dest-k').classList.toggle('on',dK);}
  else{dB=!dB;document.getElementById('dest-b').classList.toggle('on',dB);}
}
function ta(d){var m=Math.floor((new Date()-new Date(d))/60000);return m<1?'just now':m+'m ago';}
async function placeOrder(){
  var name=document.getElementById('w-name').value.trim();
  var phone=document.getElementById('w-phone').value.trim();
  var table=document.getElementById('w-table').value.trim();
  if(!name||!phone||!table){alert('Fill all details');return;}
  var courses=[];
  if(document.getElementById('chk-d').checked)courses.push({type:'drinks',qty:parseInt(document.getElementById('qty-d').value)||1,status:'waiting'});
  if(document.getElementById('chk-s').checked)courses.push({type:'starters',qty:parseInt(document.getElementById('qty-s').value)||1,status:'waiting'});
  if(document.getElementById('chk-m').checked)courses.push({type:'main',qty:parseInt(document.getElementById('qty-m').value)||1,status:'waiting'});
  if(!courses.length){alert('Select at least one course');return;}
  var btn=document.getElementById('place-btn');btn.disabled=true;btn.textContent='Sending...';
  var hasBoth=courses.find(function(c){return c.type==='drinks';})&&courses.find(function(c){return c.type==='starters';});
  var res=await post('/order',{phone:phone,orderName:name,table:table,courses:courses,sameTime:sync&&!!hasBoth,toK:dK,toB:dB});
  btn.disabled=false;btn.textContent='Send to kitchen';
  document.getElementById('w-name').value='';document.getElementById('w-phone').value='';document.getElementById('w-table').value='';
  sync=false;document.getElementById('sync-chk').checked=false;
  if(res)toast('WhatsApp sent to '+name+' ji! ✅','green');else toast('Server busy — try again','orange');
  loadOrders();
}
async function loadOrders(){
  try{var r=await fetch('/active-orders');var orders=await r.json();renderOrders(orders);}catch(e){}
}
function gc(o,type){return (o.courses||[]).find(function(c){return c.type===type;});}
function renderOrders(orders){
  var el=document.getElementById('waiter-orders');
  if(!orders.length){el.innerHTML='<div class="empty">No active tables</div>';return;}
  el.innerHTML=orders.map(function(o){
    var courses=o.courses||[];
    var st=gc(o,'starters');var main=gc(o,'main');
    var rows=courses.map(function(c){
      var lbl=c.type==='drinks'?'🍹 Drinks':c.type==='starters'?'🥗 Starters':'🍛 Main course';
      var cls=c.status==='ready'?'ready':c.status==='started'?'started':'';
      var pill=c.status==='ready'?'pill-ready':c.status==='started'?'pill-started':'pill-wait';
      var plbl=c.status==='ready'?'Ready':c.status==='started'?'Preparing':'Waiting';
      return '<div class="tl-row"><span class="tl-label '+cls+'">'+lbl+' x'+c.qty+'</span><span class="pill '+pill+'">'+plbl+'</span></div>';
    }).join('');
    // Show Start Main button when starters are ready and main is still waiting
    var showStartMain=st&&st.status==='ready'&&main&&main.status==='waiting';
    return '<div class="card"><div class="order-top"><div>'+
      '<div class="table-name">Table '+o.table+'</div>'+
      '<div class="meta">'+o.orderName+' · '+o.phone+'</div>'+
      (o.sameTime?'<span class="sync-tag">⏱ Same-time</span>':'')+
      '</div><div style="font-size:12px;color:#aaa;">'+ta(o.createdAt)+'</div></div>'+
      rows+
      '<div class="actions">'+
      (showStartMain?'<button class="btn-sm orange" onclick="startMain(\''+o._id+'\',\''+o.orderName+'\')">▶ Start main course</button>':'')+
      '<button class="btn-sm star" onclick="sendReview(\''+o._id+'\',\''+o.phone+'\',\''+o.orderName+'\')">⭐ Review</button>'+
      '<button class="btn-sm yellow" onclick="sendDelay(\''+o._id+'\')">⏰ Delay</button>'+
      '<button class="btn-sm red" onclick="markDone(\''+o._id+'\')">✓ Done</button>'+
      '</div></div>';
  }).join('');
}
async function startMain(id,name){
  await post('/update-course',{orderId:id,courseType:'main',status:'started'});
  toast('▶ Main started for '+name+' — WhatsApp sent ✅','orange');
  loadOrders();
}
async function sendReview(id,phone,name){
  var link=localStorage.getItem('tp_review_link')||'';
  await post('/review',{orderId:id,phone:phone,orderName:name,reviewLink:link});
  toast('⭐ Review request sent to '+name+' ji!','green');
}
async function sendDelay(id){await post('/order-delay',{orderId:id});toast('⏰ Delay message sent','orange');}
async function markDone(id){
  if(!confirm('Mark this table as done?'))return;
  await post('/order-done',{orderId:id});toast('Table marked done ✓','green');loadOrders();
}
</script>
</body>
</html>
