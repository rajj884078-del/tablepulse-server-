<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TablePulse — Waiter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#e6edf3;padding:14px;padding-bottom:40px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
h1{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
h1 span{font-size:13px;font-weight:500;color:#7d8590;}
.live{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:#13261a;color:#3fb950;display:inline-flex;align-items:center;gap:5px;}
.live::before{content:'';width:6px;height:6px;border-radius:50%;background:#3fb950;}
.rest{font-size:13px;color:#7d8590;margin-bottom:16px;}
.card{background:#161b22;border:1px solid #21262d;border-radius:16px;padding:16px;margin-bottom:12px;}
.section-title{font-size:12px;font-weight:700;color:#7d8590;text-transform:uppercase;letter-spacing:1px;margin:18px 4px 10px;}
label{display:block;font-size:12px;color:#7d8590;margin-bottom:6px;font-weight:500;}
input[type=text],input[type=tel],input[type=number]{width:100%;padding:14px;border:1px solid #30363d;border-radius:12px;font-size:16px;margin-bottom:14px;background:#0d1117;color:#e6edf3;}
input::placeholder{color:#484f58;}
input:focus{outline:none;border-color:#388bfd;}
.course-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #21262d;}
.course-row:last-of-type{border-bottom:none;}
.course-check{width:24px;height:24px;border-radius:7px;border:2px solid #30363d;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0;transition:all .15s;}
.course-check.on{background:#238636;border-color:#238636;color:#fff;}
.course-label{flex:1;font-size:16px;font-weight:500;}
.qty{width:64px;padding:8px;border:1px solid #30363d;border-radius:10px;font-size:15px;text-align:center;background:#0d1117;color:#e6edf3;margin:0;}
.toggle-row{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid #9e6a03;border-radius:12px;background:#1c1607;margin:14px 0;cursor:pointer;}
.toggle-label{font-size:14px;color:#e3b341;flex:1;font-weight:500;}
.toggle-box{width:24px;height:24px;border-radius:7px;border:2px solid #9e6a03;display:flex;align-items:center;justify-content:center;font-size:14px;color:#e3b341;flex-shrink:0;}
.toggle-box.on{background:#9e6a03;color:#fff;}
.dest-row{display:flex;gap:10px;margin:10px 0 16px;}
.chip{flex:1;padding:12px;border:1px solid #30363d;border-radius:12px;font-size:14px;font-weight:600;color:#7d8590;cursor:pointer;text-align:center;transition:all .15s;}
.chip.on{background:#13261a;color:#3fb950;border-color:#238636;}
.btn{width:100%;padding:16px;background:#238636;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;}
.btn:active{background:#1f7a30;transform:scale(0.98);}
.btn:disabled{opacity:0.5;}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.btn-sm{flex:1;min-width:90px;padding:12px 10px;border:1px solid #30363d;border-radius:11px;background:#21262d;color:#e6edf3;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:transform .1s,opacity .1s;-webkit-tap-highlight-color:transparent;}
.btn-sm:active{opacity:.7;transform:scale(0.96);}
.btn-sm.red{border-color:#3d1518;color:#f85149;background:#1a0f10;}
.btn-sm.yellow{border-color:#3d2e09;color:#e3b341;background:#1a1407;}
.btn-sm.star{border-color:#1f3a2a;color:#3fb950;background:#0f1a13;}
.btn-sm.orange{border-color:#5a2c0a;color:#ff9f43;background:#1f1206;font-weight:700;}
.tl-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #21262d;}
.tl-row:last-child{border-bottom:none;}
.tl-label{flex:1;font-size:14px;color:#7d8590;}
.tl-label.ready{color:#3fb950;font-weight:600;}
.tl-label.started{color:#ff9f43;font-weight:600;}
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.pill-wait{background:#21262d;color:#7d8590;}
.pill-ready{background:#13261a;color:#3fb950;}
.pill-started{background:#1f1206;color:#ff9f43;}
.toast{padding:14px;border-radius:12px;font-size:14px;font-weight:500;margin-bottom:12px;display:none;}
.toast.green{background:#13261a;color:#3fb950;border:1px solid #1f3a2a;}
.toast.orange{background:#1f1206;color:#ff9f43;border:1px solid #5a2c0a;}
.empty{text-align:center;padding:3rem 1rem;color:#484f58;font-size:15px;}
.sync-tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:#1c1607;color:#e3b341;margin-top:5px;}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.table-name{font-size:20px;font-weight:700;}
.meta{font-size:13px;color:#7d8590;margin-top:3px;}
.timer{font-size:13px;font-weight:700;padding:5px 11px;border-radius:20px;background:#21262d;color:#7d8590;white-space:nowrap;}
.timer.warn{background:#1a0f10;color:#f85149;}
.timer-wrap{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 2px;}
</style>
</head>
<body>
<div id="loginScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0d1117;">
  <div style="background:#161b22;border:1px solid #21262d;border-radius:20px;padding:44px 32px;width:320px;text-align:center;">
    <div style="font-size:38px;margin-bottom:10px;">🧑‍🍽️</div>
    <h2 style="color:#e6edf3;margin:0 0 4px;font-size:22px;">Waiter</h2>
    <p style="color:#7d8590;font-size:13px;margin:0 0 26px;">Enter restaurant PIN</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••"
      style="width:100%;padding:16px;font-size:24px;text-align:center;background:#0d1117;border:1px solid #30363d;border-radius:12px;color:#fff;letter-spacing:10px;box-sizing:border-box;"/>
    <button onclick="doLogin()" style="width:100%;margin-top:16px;padding:16px;background:#238636;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;">Enter</button>
    <p id="loginError" style="color:#f85149;font-size:13px;margin:14px 0 0;display:none;"></p>
  </div>
</div>

<div id="mainApp" style="display:none;">
  <div class="topbar">
    <h1>TablePulse <span>Waiter</span></h1>
    <span class="live">Live</span>
  </div>
  
<!-- Subscription warning banner -->
<div id="sub-banner" style="display:none;padding:12px 14px;border-radius:12px;margin-bottom:12px;font-size:14px;font-weight:600;text-align:center;"></div>

  <div class="rest" id="restName">WhatsApp connected</div>
  <div id="w-toast" class="toast green"></div>

  <div class="card">
    <div class="section-title" style="margin-top:0;">New order</div>
    <label>Customer name</label><input type="text" id="w-name" placeholder="Enter name"/>
    <label>WhatsApp number</label><input type="tel" id="w-phone" placeholder="91XXXXXXXXXX"/>
    <label>Table number</label><input type="number" id="w-table" placeholder="e.g. 5"/>
    <label style="margin-top:4px;">Courses ordered</label>
    <div class="course-row">
      <div class="course-check on" id="chk-d" onclick="toggleCourse('d')">✓</div>
      <span class="course-label">🍹 Drinks</span>
      <input class="qty" id="qty-d" type="number" value="1" min="1"/>
    </div>
    <div class="course-row">
      <div class="course-check on" id="chk-s" onclick="toggleCourse('s')">✓</div>
      <span class="course-label">🥗 Starters</span>
      <input class="qty" id="qty-s" type="number" value="1" min="1"/>
    </div>
    <div class="course-row">
      <div class="course-check on" id="chk-m" onclick="toggleCourse('m')">✓</div>
      <span class="course-label">🍛 Main course</span>
      <input class="qty" id="qty-m" type="number" value="1" min="1"/>
    </div>
    <div class="toggle-row" onclick="toggleSync()">
      <div class="toggle-box" id="sync-box"></div>
      <span class="toggle-label">⏱ Drinks + starters together</span>
    </div>
    <label>Send to</label>
    <div class="dest-row">
      <div class="chip on" id="dest-k" onclick="toggleDest('k',event)">🔥 Kitchen</div>
      <div class="chip on" id="dest-b" onclick="toggleDest('b',event)">🍹 Bar</div>
    </div>
    <button class="btn" id="place-btn" onclick="placeOrder()">Send order</button>
  </div>

  <div class="section-title">Active tables</div>
  <div id="waiter-orders"></div>
</div>

<script>
var dK=true,dB=true,sync=false,cD=true,cS=true,cM=true;
var avgStarter=18, avgMain=30;

(async function(){
  var token=localStorage.getItem('tp_token');
  if(!token)return;
  try{var r=await fetch('/verify',{headers:{'x-auth-token':token}});
  if(r.ok){var d=await r.json();showApp(d.restaurantName,d.subscriptionStatus,d.subscriptionExpiry);}
  else localStorage.removeItem('tp_token');}catch(e){}
})();

async function doLogin(){
  var pin=document.getElementById('pinInput').value.trim();
  var err=document.getElementById('loginError');err.style.display='none';
  if(!pin)return;
  try{var loginUrl=window.__SLUG__?'/r/'+window.__SLUG__+'/login':'/login';
  var r=await fetch(loginUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})});
  var d=await r.json();
  if(!r.ok){err.textContent=d.error||'Wrong PIN';err.style.display='block';return;}
  localStorage.setItem('tp_token',d.token);
  localStorage.setItem('tp_restaurant_name',d.restaurantName);
  localStorage.setItem('tp_review_link',d.googleReviewLink||'');
  if(d.avgStarterMins)localStorage.setItem('tp_avg_starter',d.avgStarterMins);
  if(d.avgMainMins)localStorage.setItem('tp_avg_main',d.avgMainMins);
  showApp(d.restaurantName);}catch(e){err.textContent='Server error.';err.style.display='block';}
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pinInput').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
});
function showApp(name, subStatus, subExpiry){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  showSubBanner(subStatus||'active', subExpiry||null);
  if(name)document.getElementById('restName').textContent=name+' — WhatsApp connected';
  avgStarter=parseInt(localStorage.getItem('tp_avg_starter'))||18;
  avgMain=parseInt(localStorage.getItem('tp_avg_main'))||30;
  loadOrders();setInterval(loadOrders,8000);
  setInterval(tickTimers,1000);
}
async function post(ep,body){
  try{var t=localStorage.getItem('tp_token');var r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':t},body:JSON.stringify(body)});return await r.json();}catch(e){return null;}
}
function toast(msg,cls){
  var el=document.getElementById('w-toast');el.className='toast '+(cls||'green');
  el.textContent=msg;el.style.display='block';setTimeout(function(){el.style.display='none';},4000);
}
function toggleCourse(c){
  if(c==='d'){cD=!cD;document.getElementById('chk-d').classList.toggle('on',cD);document.getElementById('chk-d').textContent=cD?'✓':'';}
  if(c==='s'){cS=!cS;document.getElementById('chk-s').classList.toggle('on',cS);document.getElementById('chk-s').textContent=cS?'✓':'';}
  if(c==='m'){cM=!cM;document.getElementById('chk-m').classList.toggle('on',cM);document.getElementById('chk-m').textContent=cM?'✓':'';}
}
function toggleSync(){sync=!sync;document.getElementById('sync-box').classList.toggle('on',sync);document.getElementById('sync-box').textContent=sync?'✓':'';}
function toggleDest(d,e){e.stopPropagation();
  if(d==='k'){dK=!dK;document.getElementById('dest-k').classList.toggle('on',dK);}
  else{dB=!dB;document.getElementById('dest-b').classList.toggle('on',dB);}
}
function ta(d){var m=Math.floor((new Date()-new Date(d))/60000);return m<1?'just now':m+'m ago';}

async function placeOrder(){
  var name=document.getElementById('w-name').value.trim();
  var phone=document.getElementById('w-phone').value.trim();
  var table=document.getElementById('w-table').value.trim();
  if(!name||!phone||!table){toast('Fill name, number and table','orange');return;}
  var courses=[];
  if(cD)courses.push({type:'drinks',qty:parseInt(document.getElementById('qty-d').value)||1,status:'waiting'});
  if(cS)courses.push({type:'starters',qty:parseInt(document.getElementById('qty-s').value)||1,status:'waiting'});
  if(cM)courses.push({type:'main',qty:parseInt(document.getElementById('qty-m').value)||1,status:'waiting'});
  if(!courses.length){toast('Select at least one course','orange');return;}
  var btn=document.getElementById('place-btn');btn.disabled=true;btn.textContent='Sending...';
  var hasBoth=cD&&cS;
  var res=await post('/order',{phone:phone,orderName:name,table:table,courses:courses,sameTime:sync&&hasBoth,toK:dK,toB:dB});
  btn.disabled=false;btn.textContent='Send order';
  document.getElementById('w-name').value='';document.getElementById('w-phone').value='';document.getElementById('w-table').value='';
  sync=false;document.getElementById('sync-box').classList.remove('on');document.getElementById('sync-box').textContent='';
  if(res)toast('WhatsApp sent to '+name+' ji! ✅','green');else toast('Server busy — try again','orange');
  loadOrders();
}
async function loadOrders(){
  try{var t=localStorage.getItem('tp_token');var r=await fetch('/active-orders',{headers:{'x-auth-token':t}});if(r.status===401){localStorage.removeItem('tp_token');location.reload();return;}var orders=await r.json();renderOrders(orders);}catch(e){}
}
function gc(o,type){return (o.courses||[]).find(function(c){return c.type===type;});}

function renderOrders(orders){
  var el=document.getElementById('waiter-orders');
  if(!orders.length){el.innerHTML='<div class="empty">No active tables yet</div>';return;}
  el.innerHTML=orders.map(function(o){
    var courses=o.courses||[];
    var st=gc(o,'starters');var main=gc(o,'main');
    var rows=courses.map(function(c){
      var lbl=c.type==='drinks'?'🍹 Drinks':c.type==='starters'?'🥗 Starters':'🍛 Main course';
      var cls=c.status==='ready'?'ready':c.status==='started'?'started':'';
      var pill=c.status==='ready'?'pill-ready':c.status==='started'?'pill-started':'pill-wait';
      var plbl=c.status==='ready'?'Ready':c.status==='started'?'Preparing':'Waiting';
      return '<div class="tl-row"><span class="tl-label '+cls+'">'+lbl+' x'+c.qty+'</span><span class="pill '+pill+'">'+plbl+'</span></div>';
    }).join('');
    // Timers
    var timers='';
    // Starter timer: from order created until starters ready
    if(st&&st.status!=='ready'){
      timers+='<span class="timer" data-since="'+o.createdAt+'" data-avg="'+avgStarter+'" data-lbl="Starter">Starter 0m</span>';
    }
    // Main timer: from mainStartedAt until main ready
    if(main&&main.status==='started'&&o.mainStartedAt){
      timers+='<span class="timer" data-since="'+o.mainStartedAt+'" data-avg="'+avgMain+'" data-lbl="Main">Main 0m</span>';
    }
    var showStartMain=st&&st.status==='ready'&&main&&main.status==='waiting';
    // Serve together: both starters+main ordered, main still waiting, starters not done yet
    var showServeTogether=st&&main&&st.status==='waiting'&&main.status==='waiting';
    return '<div class="card"><div class="order-top"><div>'+
      '<div class="table-name">Table '+o.table+'</div>'+
      '<div class="meta">'+o.orderName+' · '+o.phone+'</div>'+
      (o.sameTime?'<span class="sync-tag">⏱ Same-time</span>':'')+
      '</div><div style="font-size:12px;color:#484f58;text-align:right;">'+ta(o.createdAt)+'</div></div>'+
      (timers?'<div class="timer-wrap">'+timers+'</div>':'')+
      rows+
      '<div class="btn-row">'+
      (showServeTogether?'<button class="btn-sm orange" style="flex:2;" onclick="serveTogether(\''+o._id+'\',\''+o.orderName+'\')">🚀 Serve together</button>':'')+
      (!showServeTogether&&showStartMain?'<button class="btn-sm orange" onclick="startMain(\''+o._id+'\',\''+o.orderName+'\')">▶ Start main</button>':'')+
      '<button class="btn-sm star" onclick="sendReview(\''+o._id+'\')">⭐ Review</button>'+
      '<button class="btn-sm yellow" onclick="sendDelay(\''+o._id+'\')">⏰ Delay</button>'+
      '<button class="btn-sm red" onclick="markDone(\''+o._id+'\')">✓ Done</button>'+
      '</div></div>';
  }).join('');
  tickTimers();
}
function tickTimers(){
  var els=document.querySelectorAll('.timer');
  els.forEach(function(t){
    var since=new Date(t.getAttribute('data-since'));
    var avg=parseInt(t.getAttribute('data-avg'))||999;
    var lbl=t.getAttribute('data-lbl');
    var mins=Math.floor((new Date()-since)/60000);
    t.textContent=lbl+' '+mins+'m';
    if(mins>=avg)t.classList.add('warn');else t.classList.remove('warn');
  });
}
async function startMain(id,name){
  await post('/update-course',{orderId:id,courseType:'main',status:'started'});
  toast('▶ Main started for '+name+' — WhatsApp sent ✅','orange');
  loadOrders();
}
async function serveTogether(id,name){
  // Mark starters ready first, then immediately start main
  await post('/update-course',{orderId:id,courseType:'starters',status:'ready'});
  await post('/update-course',{orderId:id,courseType:'main',status:'started'});
  toast('🚀 Both courses started for '+name+' — WhatsApp sent ✅','orange');
  loadOrders();
}
async function sendReview(id){
  var link=localStorage.getItem('tp_review_link')||'';
  var res=await post('/review',{orderId:id,reviewLink:link});
  if(res&&res.status==='ok') toast('⭐ Review request sent! ✅','green');
  else toast('Review send failed — try again','orange');
  loadOrders();
}
async function sendDelay(id){await post('/order-delay',{orderId:id});toast('⏰ Delay message sent','orange');}
async function markDone(id){
  if(!confirm('Mark this table as done?'))return;
  await post('/order-done',{orderId:id});toast('Table marked done ✓','green');loadOrders();
}

function showSubBanner(status, expiry) {
  var el = document.getElementById('sub-banner');
  if (!el) return;
  if (status === 'warning' && expiry) {
    var d = new Date(expiry).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    el.style.display = 'block';
    el.style.background = '#1c1607';
    el.style.border = '1px solid #9e6a03';
    el.style.color = '#e3b341';
    el.textContent = '⚠️ Renew before ' + d + ' to continue using TablePulse';
  } else if (status === 'expired') {
    el.style.display = 'block';
    el.style.background = '#1a0f10';
    el.style.border = '1px solid #6e1a1a';
    el.style.color = '#f85149';
    el.textContent = '🔴 Subscription expired — contact restaurant owner to renew';
  }
}

</script>
</body>
</html>
