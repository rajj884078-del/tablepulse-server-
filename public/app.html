<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0e1014">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TablePulse">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>TablePulse</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0e1014;color:#e8eaed;}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.screen.active{display:flex;}
.panel{background:#161a20;border:1px solid #232830;border-radius:18px;padding:36px 28px;width:100%;max-width:360px;text-align:center;}
.logo{font-size:36px;margin-bottom:10px;}
.panel-title{font-size:22px;font-weight:700;color:#e8eaed;margin:0 0 4px;}
.panel-sub{color:#8b9099;font-size:13px;margin:0 0 24px;}
.pin-input{width:100%;padding:16px;font-size:24px;text-align:center;background:#0e1014;border:1px solid #2b313a;border-radius:11px;color:#e8eaed;letter-spacing:10px;outline:none;}
.pin-input:focus{border-color:#2563eb;}
.pin-err{color:#f0635a;font-size:13px;margin:10px 0 0;display:none;}
.btn-enter{width:100%;margin-top:16px;padding:16px;background:#2563eb;border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
.btn-enter:disabled{opacity:0.5;cursor:default;}
.rest-name{font-size:14px;color:#8b9099;margin-bottom:20px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px;}
.role-card{background:#161a20;border:1px solid #232830;border-radius:14px;padding:22px 12px;text-align:center;cursor:pointer;transition:border-color .12s,background .12s;}
.role-card:active{background:#1e232c;border-color:#3b82f6;}
.role-icon{font-size:30px;margin-bottom:8px;}
.role-label{font-size:14px;font-weight:600;color:#e8eaed;}
.role-sub{font-size:11px;color:#8b9099;margin-top:2px;}
.logout{margin-top:18px;font-size:13px;color:#525965;cursor:pointer;text-align:center;}
.logout:hover{color:#8b9099;}
</style>
</head>
<body>

<div class="screen active" id="pin-screen">
  <div class="panel">
    <div class="logo">🍽</div>
    <div class="panel-title">TablePulse</div>
    <div class="panel-sub">Enter your restaurant PIN</div>
    <input id="pinInput" class="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••"/>
    <button class="btn-enter" id="loginBtn" onclick="doLogin()">Enter</button>
    <p class="pin-err" id="loginError"></p>
  </div>
</div>

<div class="screen" id="role-screen">
  <div class="logo" style="font-size:28px;margin-bottom:6px;">🍽</div>
  <div style="font-size:20px;font-weight:700;margin-bottom:4px;">TablePulse</div>
  <div class="rest-name" id="rest-name"></div>
  <div class="role-grid">
    <div class="role-card" onclick="go('waiter.html')">
      <div class="role-icon">👤</div>
      <div class="role-label">Waiter</div>
      <div class="role-sub">Orders &amp; tables</div>
    </div>
    <div class="role-card" onclick="go('kitchen.html')">
      <div class="role-icon">🔥</div>
      <div class="role-label">Kitchen</div>
      <div class="role-sub">Food prep</div>
    </div>
    <div class="role-card" onclick="go('barman.html')">
      <div class="role-icon">🍹</div>
      <div class="role-label">Barman</div>
      <div class="role-sub">Drinks</div>
    </div>
    <div class="role-card" onclick="go('others.html')">
      <div class="role-icon">📋</div>
      <div class="role-label">Others</div>
      <div class="role-sub">Attendance &amp; staff</div>
    </div>
  </div>
  <div class="logout" onclick="logout()">Sign out</div>
</div>

<script>
(async function init(){
  var token=localStorage.getItem('tp_token');
  if(!token)return;
  try{
    var r=await fetch('/verify',{headers:{'x-auth-token':token}});
    if(r.ok)showRoles();
    else localStorage.removeItem('tp_token');
  }catch(e){}
})();

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pinInput').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
});

async function doLogin(){
  var pin=document.getElementById('pinInput').value.trim();
  var err=document.getElementById('loginError');
  var btn=document.getElementById('loginBtn');
  err.style.display='none';
  if(!pin)return;
  btn.disabled=true;btn.textContent='Checking…';
  try{
    var loginUrl=window.__SLUG__?'/r/'+window.__SLUG__+'/login':'/login';
    var r=await fetch(loginUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})});
    var d=await r.json();
    if(!r.ok){err.textContent=d.error||'Wrong PIN';err.style.display='block';btn.disabled=false;btn.textContent='Enter';return;}
    localStorage.setItem('tp_token',d.token);
    localStorage.setItem('tp_restaurant_name',d.restaurantName||'');
    localStorage.setItem('tp_review_link',d.googleReviewLink||'');
    if(d.avgStarterMins)localStorage.setItem('tp_avg_starter',d.avgStarterMins);
    if(d.avgMainMins)localStorage.setItem('tp_avg_main',d.avgMainMins);
    if(d.totalTables)localStorage.setItem('tp_total_tables',d.totalTables);
    showRoles();
  }catch(e){err.textContent='Server error. Try again.';err.style.display='block';btn.disabled=false;btn.textContent='Enter';}
}

function showRoles(){
  document.getElementById('pin-screen').classList.remove('active');
  document.getElementById('role-screen').classList.add('active');
  var name=localStorage.getItem('tp_restaurant_name');
  if(name)document.getElementById('rest-name').textContent=name;
}

function go(page){window.location.href=page;}

function logout(){
  localStorage.removeItem('tp_token');
  localStorage.removeItem('tp_restaurant_name');
  localStorage.removeItem('tp_review_link');
  document.getElementById('role-screen').classList.remove('active');
  document.getElementById('pin-screen').classList.add('active');
  document.getElementById('pinInput').value='';
}
</script>
</body>
</html>
