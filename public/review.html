<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How was your experience?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f9f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 32px; margin-bottom: 8px; }
    .restaurant-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .question {
      font-size: 16px;
      color: #555;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .btn {
      flex: 1;
      max-width: 160px;
      padding: 20px 12px;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-good { background: #e8f9ee; color: #1a7a40; }
    .btn-good:hover { background: #d4f4e0; }
    .btn-bad  { background: #fff0f0; color: #c0392b; }
    .btn-bad:hover  { background: #ffe0e0; }
    /* SVG face */
    .face-svg {
      display: block;
      width: 72px;
      height: 72px;
      margin: 0 auto;
      overflow: visible;
    }

    @keyframes face-bounce {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.07); }
    }

    @keyframes face-sway {
      0%, 100% { transform: rotate(0deg); }
      25%      { transform: rotate(-3.5deg); }
      75%      { transform: rotate(3.5deg); }
    }

    .happy-bounce {
      transform-box: fill-box;
      transform-origin: center;
      animation: face-bounce 2.4s ease-in-out infinite;
    }

    .sad-sway {
      transform-box: fill-box;
      transform-origin: center;
      animation: face-sway 3.2s ease-in-out infinite;
    }

    /* complaint form */
    #complaint-section { display: none; text-align: left; margin-top: 28px; }
    #complaint-section h3 { font-size: 17px; color: #1a1a1a; margin-bottom: 16px; text-align: center; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input[type="text"], textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafafa;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus { border-color: #6c63ff; background: #fff; }
    textarea { min-height: 120px; resize: vertical; }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #574fd6; }
    .btn-submit:disabled { background: #b0aae8; cursor: not-allowed; }

    /* thank-you / states */
    #thankyou { display: none; text-align: center; }
    #thankyou .big-emoji { font-size: 56px; margin-bottom: 16px; }
    #thankyou h2 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    #thankyou p { font-size: 15px; color: #666; line-height: 1.5; }
    #error-msg { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }
    #loading { font-size: 15px; color: #888; }

    /* star picker */
    #star-section { display: none; margin-top: 28px; text-align: center; }
    .star-prompt { font-size: 15px; color: #555; margin-bottom: 16px; }
    .star-row { display: flex; gap: 6px; justify-content: center; }
    .star-btn {
      background: none; border: none; font-size: 42px; color: #ddd;
      cursor: pointer; padding: 4px 2px; line-height: 1;
      transition: color 0.15s, transform 0.1s;
    }
    .star-btn.lit { color: #f5a623; }
    .star-btn:active { transform: scale(0.88); }

    /* suggestions */
    #suggestions-section { display: none; margin-top: 24px; text-align: left; }
    .suggestions-prompt {
      font-size: 13px; color: #777; text-align: center;
      margin-bottom: 14px; line-height: 1.5;
    }
    .suggestion-card {
      position: relative;
      background: #f9f9f7;
      border: 1.5px solid #e4e4e4;
      border-radius: 12px;
      padding: 14px 48px 14px 14px;
      margin-bottom: 10px;
      font-size: 14px;
      color: #333;
      line-height: 1.55;
    }
    .copy-btn {
      position: absolute; top: 10px; right: 10px;
      background: #fff; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 5px 7px; cursor: pointer; color: #888; font-size: 13px;
      line-height: 1; transition: color 0.15s, border-color 0.15s, background 0.15s;
      display: flex; align-items: center; gap: 3px;
      animation: copy-pulse 1.8s ease-in-out infinite;
    }
    @keyframes copy-pulse {
      0%, 100% { border-color: #ddd;    box-shadow: none; }
      50%       { border-color: #2a9a50; box-shadow: 0 0 0 3px rgba(42,154,80,0.15); }
    }

    @keyframes card-copied {
      0%   { border-color: #2a9a50; box-shadow: 0 0 0 3px rgba(42,154,80,0.28); }
      60%  { border-color: #2a9a50; box-shadow: 0 0 0 6px rgba(42,154,80,0.08); }
      100% { border-color: #e4e4e4; box-shadow: none; }
    }
    .suggestion-card.card-copied {
      animation: card-copied 0.65s ease-out forwards;
    }

    @keyframes copy-flash {
      0%   { box-shadow: 0 0 0 0 rgba(42,154,80,0.5); background: #a8ecc4; }
      55%  { box-shadow: 0 0 0 8px rgba(42,154,80,0);  background: #e8f9ee; }
      100% { box-shadow: 0 0 0 0 rgba(42,154,80,0);    background: #e8f9ee; }
    }
    .copy-btn.copied {
      color: #2a9a50; border-color: #2a9a50; background: #e8f9ee;
      animation: copy-flash 0.52s ease-out;
    }
    #ready-btn {
      width: 100%; margin-top: 6px; padding: 15px;
      background: #1a7a40; color: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    #ready-btn:hover { background: #156834; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">Loading…</div>

    <div id="main" style="display:none">
      <div class="logo">🍽️</div>
      <div class="restaurant-name" id="rname"></div>
      <div class="question">How was your experience?</div>
      <div class="btn-row">
        <button class="btn btn-good" id="btn-good">
          <svg class="face-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g class="happy-bounce">
              <circle cx="50" cy="50" r="46" fill="#e8f9ee" stroke="#2a9a50" stroke-width="2.5"/>
              <circle cx="35" cy="40" r="4.5" fill="#2a9a50"/>
              <circle cx="65" cy="40" r="4.5" fill="#2a9a50"/>
              <path fill="none" stroke="#2a9a50" stroke-width="3.5" stroke-linecap="round">
                <animate attributeName="d"
                  values="M 33,62 Q 50,62 67,62; M 33,57 Q 50,75 67,57; M 33,62 Q 50,62 67,62"
                  dur="2.4s" repeatCount="indefinite"
                  calcMode="spline"
                  keyTimes="0; 0.5; 1"
                  keySplines="0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95"/>
              </path>
            </g>
          </svg>
          Good
        </button>
        <button class="btn btn-bad" id="btn-bad">
          <svg class="face-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g class="sad-sway">
              <circle cx="50" cy="50" r="46" fill="#f0f4f8" stroke="#7a8fa8" stroke-width="2.5"/>
              <circle cx="35" cy="40" r="4.5" fill="#7a8fa8"/>
              <circle cx="65" cy="40" r="4.5" fill="#7a8fa8"/>
              <path fill="none" stroke="#7a8fa8" stroke-width="3.5" stroke-linecap="round">
                <animate attributeName="d"
                  values="M 33,62 Q 50,62 67,62; M 33,67 Q 50,50 67,67; M 33,62 Q 50,62 67,62"
                  dur="3.2s" repeatCount="indefinite"
                  calcMode="spline"
                  keyTimes="0; 0.5; 1"
                  keySplines="0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95"/>
              </path>
            </g>
          </svg>
          Could be better
        </button>
      </div>

      <div id="complaint-section">
        <h3>Tell us what went wrong</h3>
        <label for="cname">Your name (optional)</label>
        <input type="text" id="cname" placeholder="e.g. Raj" maxlength="80">
        <label for="ctext">What could we improve?</label>
        <textarea id="ctext" placeholder="Share your feedback…" maxlength="1000"></textarea>
        <button class="btn-submit" id="btn-submit">Send feedback</button>
        <div id="error-msg">Something went wrong. Please try again.</div>
      </div>

      <div id="star-section">
        <div class="star-prompt">How many stars would you give us?</div>
        <div class="star-row">
          <button class="star-btn" data-star="1">★</button>
          <button class="star-btn" data-star="2">★</button>
          <button class="star-btn" data-star="3">★</button>
          <button class="star-btn" data-star="4">★</button>
          <button class="star-btn" data-star="5">★</button>
        </div>
      </div>

      <div id="suggestions-section">
        <div class="suggestions-prompt">Tap a review to copy it, then paste it into Google:</div>
        <div id="suggestion-cards"></div>
        <button id="ready-btn">Open Google Reviews ↗</button>
      </div>
    </div>

    <div id="thankyou">
      <div class="big-emoji" id="ty-emoji"></div>
      <h2 id="ty-title"></h2>
      <p id="ty-body"></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const pin = params.get('r') || '';
    let googleReviewLink = '';

    async function init() {
      if (!pin) { showError('Missing restaurant code.'); return; }
      try {
        const res = await fetch('/review-info?pin=' + encodeURIComponent(pin));
        const data = await res.json();
        if (!data.ok) { showError('Restaurant not found.'); return; }
        googleReviewLink = data.googleReviewLink || '';
        document.getElementById('rname').textContent = data.name;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display = '';
      } catch (e) { showError('Could not load. Please try again.'); }
    }

    function showError(msg) {
      document.getElementById('loading').textContent = msg;
    }

    document.getElementById('btn-good').addEventListener('click', async () => {
      await postFeedback({ restaurantPin: pin, type: 'happy_clicked' });
      document.getElementById('btn-good').style.display = 'none';
      document.getElementById('btn-bad').style.display = 'none';
      document.getElementById('star-section').style.display = 'block';
    });

    // Star picker
    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const chosen = parseInt(btn.dataset.star, 10);
        document.querySelectorAll('.star-btn').forEach(b =>
          b.classList.toggle('lit', parseInt(b.dataset.star, 10) <= chosen)
        );
        // Small delay so user sees the stars light before transition
        await new Promise(r => setTimeout(r, 220));
        if (chosen <= 3) {
          document.getElementById('star-section').style.display = 'none';
          document.getElementById('complaint-section').style.display = 'block';
        } else {
          document.getElementById('star-section').style.display = 'none';
          await loadSuggestions(chosen);
          document.getElementById('suggestions-section').style.display = 'block';
        }
      });
    });

    async function loadSuggestions(stars) {
      const container = document.getElementById('suggestion-cards');
      container.innerHTML = '<div style="color:#888;font-size:14px;text-align:center;padding:12px 0">Loading…</div>';
      try {
        const res  = await fetch(`/review-suggestions?pin=${encodeURIComponent(pin)}&stars=${stars}`);
        const data = await res.json();
        container.innerHTML = '';
        if (!data.ok || !data.suggestions || !data.suggestions.length) return;
        data.suggestions.forEach(text => {
          const card = document.createElement('div');
          card.className = 'suggestion-card';

          const p = document.createElement('p');
          p.style.margin = '0';
          p.textContent = text;

          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.title = 'Copy to clipboard';
          copyBtn.innerHTML =
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
              '<rect x="9" y="2" width="13" height="13" rx="2"/>' +
              '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>' +
            '</svg> Copy';

          copyBtn.addEventListener('click', async () => {
            try { await navigator.clipboard.writeText(text); } catch (_) {
              const ta = document.createElement('textarea');
              ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
              document.body.appendChild(ta); ta.select(); document.execCommand('copy');
              document.body.removeChild(ta);
            }
            card.classList.add('card-copied');
            card.addEventListener('animationend', () => card.classList.remove('card-copied'), { once: true });
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(() => {
              copyBtn.innerHTML =
                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
                  '<rect x="9" y="2" width="13" height="13" rx="2"/>' +
                  '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>' +
                '</svg> Copy';
              copyBtn.classList.remove('copied');
            }, 1600);
          });

          card.appendChild(p);
          card.appendChild(copyBtn);
          container.appendChild(card);
        });
      } catch (_) { container.innerHTML = ''; }
    }

    document.getElementById('ready-btn').addEventListener('click', () => {
      if (googleReviewLink) { location.href = googleReviewLink; }
      else { showThankyou('⭐', 'Thank you!', 'We\'re glad you had a great experience.'); }
    });

    document.getElementById('btn-bad').addEventListener('click', () => {
      document.getElementById('complaint-section').style.display = 'block';
      document.getElementById('btn-bad').style.display = 'none';
      document.getElementById('btn-good').style.display = 'none';
    });

    document.getElementById('btn-submit').addEventListener('click', async () => {
      const btn = document.getElementById('btn-submit');
      const errEl = document.getElementById('error-msg');
      const text = document.getElementById('ctext').value.trim();
      const name = document.getElementById('cname').value.trim();
      btn.disabled = true;
      btn.textContent = 'Sending…';
      errEl.style.display = 'none';
      const ok = await postFeedback({ restaurantPin: pin, type: 'complaint', complaintText: text, customerName: name });
      if (ok) {
        showThankyou('🙏', 'Thank you!', 'Your feedback has reached us. We\'re sorry your experience wasn\'t perfect — we\'ll definitely work on improving.');
      } else {
        btn.disabled = false;
        btn.textContent = 'Send feedback';
        errEl.style.display = '';
      }
    });

    async function postFeedback(payload) {
      try {
        const res = await fetch('/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        return !!data.ok;
      } catch (e) { return false; }
    }

    function showThankyou(emoji, title, body) {
      document.getElementById('main').style.display = 'none';
      document.getElementById('ty-emoji').textContent = emoji;
      document.getElementById('ty-title').textContent = title;
      document.getElementById('ty-body').textContent  = body;
      document.getElementById('thankyou').style.display = 'block';
    }

    init();
  </script>
</body>
</html>
